<!DOCTYPE html>
<html>
  <head>
    <title>Save Item App</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <div class="all-el">
      <div>
        <input class="js-input-el input-el" placeholder="Save an Item in an empty array: ">
      </div>
      <div>
        <ul class="js-list list">
          
        </ul>
      </div>
      <div class="save-reset">
        <div>
          <button class="js-input-save input-save">SAVE ITEMS</button>
        </div>
        <div>
          <button class="js-reset reset">RESET</button>
        </div>
        <div>
          <button class="js-saved-items saved-items">SAVED ITEMS</button>
        </div>
        <div>
          <button class="js-remove-items remove-items">REMOVE ITEMS</button>
        </div>
      </div>
    </div>
    <!--box-sizing:border-box; makes input element to be equal to width:100%; specified and also including padding-->

    <script src="index.js"></script>
  </body>
</html>
